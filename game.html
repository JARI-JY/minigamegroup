<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블록 깨기 (Breakout)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d4ff, #ff00aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    #info {
      display: flex;
      gap: 40px;
      margin-bottom: 12px;
      font-size: 1rem;
      color: #aaa;
    }
    #info span { color: #fff; font-weight: bold; }
    canvas {
      border: 2px solid #333;
      border-radius: 8px;
      box-shadow: 0 0 40px #00d4ff44;
      display: block;
    }
    #overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #000000cc;
      border: 2px solid #00d4ff;
      border-radius: 16px;
      padding: 40px 60px;
      text-align: center;
      display: none;
      min-width: 280px;
    }
    #overlay h2 { font-size: 2rem; margin-bottom: 8px; }
    #overlay p { color: #aaa; margin-bottom: 20px; font-size: 0.95rem; }
    #overlay button {
      background: linear-gradient(90deg, #00d4ff, #ff00aa);
      border: none;
      color: #fff;
      padding: 12px 36px;
      font-size: 1.1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #overlay button:hover { opacity: 0.8; }
    #hint {
      margin-top: 10px;
      color: #555;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <h1>BREAKOUT</h1>
  <div id="info">
    점수: <span id="score">0</span> &nbsp;|&nbsp;
    레벨: <span id="level">1</span> &nbsp;|&nbsp;
    목숨: <span id="lives">3</span>
  </div>
  <div style="position:relative;">
    <canvas id="c" width="600" height="480"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">BREAKOUT</h2>
      <p id="overlay-msg">마우스 또는 방향키로 패들을 조종하세요</p>
      <button id="overlay-btn" onclick="startGame()">시작하기</button>
    </div>
  </div>
  <div id="hint">← → 방향키 또는 마우스로 이동 &nbsp;|&nbsp; Space: 발사</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const PADDLE_W = 100, PADDLE_H = 12, PADDLE_Y = H - 40;
const BALL_R = 8;
const BRICK_ROWS = 5, BRICK_COLS = 10;
const BRICK_W = 52, BRICK_H = 18, BRICK_PAD = 4;
const BRICK_OFF_X = (W - (BRICK_W + BRICK_PAD) * BRICK_COLS + BRICK_PAD) / 2;
const BRICK_OFF_Y = 50;

const COLORS = [
  ['#ff4466','#cc2244'],
  ['#ff8822','#cc6600'],
  ['#ffdd00','#ccaa00'],
  ['#44ff88','#22cc55'],
  ['#00ccff','#0088cc'],
];

let paddle, ball, bricks, score, lives, level, state, keys;

function initGame() {
  keys = {};
  score = 0;
  lives = 3;
  level = 1;
  initLevel();
}

function initLevel() {
  paddle = { x: W / 2 - PADDLE_W / 2, y: PADDLE_Y, w: PADDLE_W };
  ball = {
    x: W / 2, y: PADDLE_Y - BALL_R - 2,
    vx: (Math.random() > 0.5 ? 1 : -1) * (3 + level * 0.4),
    vy: -(4 + level * 0.4),
    launched: false
  };
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      const hp = (BRICK_ROWS - r > 2) ? 1 : (BRICK_ROWS - r > 1) ? 2 : 3;
      bricks.push({
        x: BRICK_OFF_X + c * (BRICK_W + BRICK_PAD),
        y: BRICK_OFF_Y + r * (BRICK_H + BRICK_PAD),
        w: BRICK_W, h: BRICK_H,
        row: r, hp, maxHp: hp, alive: true
      });
    }
  }
  updateUI();
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lives').textContent = '❤️'.repeat(lives);
}

function showOverlay(title, msg, btn) {
  state = 'overlay';
  const o = document.getElementById('overlay');
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-msg').textContent = msg;
  document.getElementById('overlay-btn').textContent = btn;
  o.style.display = 'block';
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

function startGame() {
  hideOverlay();
  state = 'playing';
  loop();
}

window.startGame = startGame;

function drawBrick(b) {
  if (!b.alive) return;
  const [fill, dark] = COLORS[b.row % COLORS.length];
  const alpha = b.hp / b.maxHp;
  ctx.globalAlpha = 0.5 + 0.5 * alpha;
  const grd = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
  grd.addColorStop(0, fill);
  grd.addColorStop(1, dark);
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.roundRect(b.x, b.y, b.w, b.h, 4);
  ctx.fill();
  ctx.globalAlpha = 0.3 * alpha;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.globalAlpha = 1;
  if (b.maxHp > 1) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(b.hp, b.x + b.w / 2, b.y + b.h / 2 + 4);
  }
}

function drawPaddle() {
  const grd = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x + paddle.w, paddle.y);
  grd.addColorStop(0, '#00d4ff');
  grd.addColorStop(1, '#ff00aa');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, PADDLE_H, 6);
  ctx.fill();
  ctx.fillStyle = '#ffffff44';
  ctx.fillRect(paddle.x + 6, paddle.y + 3, paddle.w - 12, 3);
}

function drawBall() {
  const grd = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, BALL_R);
  grd.addColorStop(0, '#ffffff');
  grd.addColorStop(1, '#00d4ff');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fill();
}

function drawBackground() {
  ctx.fillStyle = '#0d0d20';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
}

let particles = [];

function spawnParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 1, color });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.life -= 0.05;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

let mouseX = W / 2;
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
});
canvas.addEventListener('click', () => { if (!ball.launched) ball.launched = true; });
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') ball.launched = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

let raf;
function loop() {
  if (state !== 'playing') return;
  update();
  draw();
  raf = requestAnimationFrame(loop);
}

function update() {
  // Paddle
  if (keys['ArrowLeft']) paddle.x = Math.max(0, paddle.x - 7);
  if (keys['ArrowRight']) paddle.x = Math.min(W - paddle.w, paddle.x + 7);
  if (!keys['ArrowLeft'] && !keys['ArrowRight']) {
    const target = mouseX - paddle.w / 2;
    paddle.x += (target - paddle.x) * 0.15;
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
  }

  if (!ball.launched) {
    ball.x = paddle.x + paddle.w / 2;
    return;
  }

  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall
  if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
  if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }
  if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }

  // Paddle collision
  if (ball.vy > 0 &&
      ball.y + BALL_R >= paddle.y &&
      ball.y + BALL_R <= paddle.y + PADDLE_H + 4 &&
      ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
    const rel = (ball.x - paddle.x) / paddle.w - 0.5;
    const speed = Math.hypot(ball.vx, ball.vy);
    const angle = rel * (Math.PI / 3);
    ball.vx = speed * Math.sin(angle);
    ball.vy = -speed * Math.cos(angle);
    ball.y = paddle.y - BALL_R;
  }

  // Ball lost
  if (ball.y - BALL_R > H) {
    lives--;
    updateUI();
    if (lives <= 0) {
      state = 'gameover';
      cancelAnimationFrame(raf);
      showOverlay('GAME OVER', `최종 점수: ${score}`, '다시 시작');
      document.getElementById('overlay-btn').onclick = () => { initGame(); startGame(); };
      return;
    }
    ball = {
      x: paddle.x + paddle.w / 2, y: paddle.y - BALL_R - 2,
      vx: (Math.random() > 0.5 ? 1 : -1) * (3 + level * 0.4),
      vy: -(4 + level * 0.4),
      launched: false
    };
  }

  // Brick collision
  for (const b of bricks) {
    if (!b.alive) continue;
    if (ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + b.w &&
        ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + b.h) {
      b.hp--;
      if (b.hp <= 0) {
        b.alive = false;
        score += (b.maxHp * 10) * level;
        spawnParticles(b.x + b.w/2, b.y + b.h/2, COLORS[b.row % COLORS.length][0]);
      } else {
        score += 5;
      }
      updateUI();
      const fromLeft = ball.x < b.x;
      const fromRight = ball.x > b.x + b.w;
      const fromTop = ball.y < b.y;
      const fromBottom = ball.y > b.y + b.h;
      const overlapX = (ball.vx > 0) ? (ball.x + BALL_R - b.x) : (b.x + b.w - (ball.x - BALL_R));
      const overlapY = (ball.vy > 0) ? (ball.y + BALL_R - b.y) : (b.y + b.h - (ball.y - BALL_R));
      if (overlapX < overlapY) ball.vx = -ball.vx;
      else ball.vy = -ball.vy;
      break;
    }
  }

  // Level clear
  if (bricks.every(b => !b.alive)) {
    level++;
    cancelAnimationFrame(raf);
    state = 'overlay';
    showOverlay('LEVEL CLEAR!', `레벨 ${level} 시작합니다!`, '계속하기');
    document.getElementById('overlay-btn').onclick = () => { initLevel(); startGame(); };
  }
}

function draw() {
  drawBackground();
  for (const b of bricks) drawBrick(b);
  updateParticles();
  drawPaddle();
  drawBall();
}

// Init
initGame();
showOverlay('BREAKOUT', '마우스 또는 방향키로 패들을 조종하세요', '시작하기');
document.getElementById('overlay-btn').onclick = () => { startGame(); };
</script>
</body>
</html>
